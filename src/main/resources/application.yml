spring:
  application:
    name: re-bank-app
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  jpa:
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      connect-timeout: 2000

cloudinary:
  url: ${CLOUDINARY_URL}